[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
lib_deps = 
	electroniccats/MPU6050@^1.4.4
	arduino-libraries/Servo@^1.3.0
	adafruit/Adafruit MPL3115A2 Library@^2.1.2
	arduino-libraries/SD@^1.3.0
	adafruit/Adafruit NeoPixel@^1.15.5
